<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning</title>
    <link rel="stylesheet" href="planning/css/styles.css">
</head>
<body>

<!-- ============================================================
     BLOQUE: Pantalla principal del módulo Planning

     Qué hace:
     - Contiene toda la interfaz visible del módulo Planning.
     - El login se gestiona desde el hub/login general.
     - El contenido se muestra cuando auth.verificarSesion() confirma sesión.
     ============================================================ -->

<div id="appScreen">
    <div class="main-container">

        <!-- ============================================================
             BLOQUE: Cabecera Planning mobile first

             Qué hace:
             - Coloca navegación arriba: volver al menú y salir.
             - Centra el nombre del módulo para mejorar jerarquía visual.
             - Muestra el rol o nombre de sesión debajo del título.
             - Evita estilos inline para que CSS controle todo el diseño.
             ============================================================ -->

        <header class="planning-header no-print">
            <div class="planning-header-actions">
                <button class="btn-volver" type="button" onclick="window.location.href='menu-principal.html'">
                    ← Menú principal
                </button>

                <button class="btn-logout" type="button" onclick="auth.cerrarSesion('index.html')">
                    Salir
                </button>
            </div>

            <div class="planning-header-title">
                <h1>Planning</h1>
                <div id="planSesionInfo"></div>
            </div>
        </header>

        <!-- ============================================================
             BLOQUE: Franja fecha + plan

             Qué hace:
             - Mantiene la fecha y el plan actual en fondo blanco.
             - Se conecta visualmente con la cabecera superior.
             - Refuerza el contexto operativo del Planning.
             ============================================================ -->

        <div class="header-info no-print">
            <div class="header-left">
                <div class="date-text" id="displayDate"></div>
            </div>

            <div class="header-right">
                <div class="plan-label">PLAN <span id="planLabelTop">A</span></div>
            </div>
        </div>

        <!-- ============================================================
             BLOQUE: Contenedor de planes

             Qué hace:
             - El JavaScript genera dinámicamente los botones A, B, C, D y Alt.
             - Se deja vacío para evitar duplicar planes si cambian desde PostgreSQL.
             ============================================================ -->

        <div class="tabs no-print"></div>

        <!-- ============================================================
             BLOQUE: Gestión admin de residentes asignados

             Qué hace:
             - Permite al admin asignar residentes a plan + turno.
             - El contenido real del formulario lo construye planning/js/script.js.
             ============================================================ -->

        <div class="collapsible-box no-print">
            <div class="collapsible-header" onclick="toggleBox('adminBox')">
                <span>⚙️ Asignar residentes al plan</span>
                <span id="adminBox-arrow">▼</span>
            </div>

            <div class="collapsible-content" id="adminBox">
                <div class="form-box"></div>
                <div id="editList"></div>
            </div>
        </div>

        <!-- ============================================================
             BLOQUE: Checklist principal

             Qué hace:
             - Admin ve resumen compacto.
             - Auxiliar ve cards de pendientes y atendidos.
             - El contenido se renderiza desde planning/js/script.js.
             ============================================================ -->

        <div id="checklist" class="no-print"></div>

        <!-- ============================================================
             BLOQUE: Historial del día

             Qué hace:
             - Muestra registros del día según turno y plan.
             - Permite alternar entre plan actual y todos los planes.
             ============================================================ -->

        <div class="history-box no-print">
            <div class="history-header" onclick="toggleBox('historialBox')">
                <span>📋 HISTORIAL DEL DÍA</span>
                <span id="historialBox-arrow">▼</span>
            </div>

            <div class="collapsible-content" id="historialBox">
                <div class="history-actions">
                    <button id="btnToggleMatrix" class="btn-history-toggle" type="button" onclick="toggleMatrixView()">
                        Ver Todos los Planes
                    </button>
                </div>

                <div class="history-table-wrap">
                    <table id="matrixTable">
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Hab / Plan</th>
                                <th>Residente</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ============================================================
             BLOQUE: Reporte imprimible

             Qué hace:
             - Lanza preparación de reporte y usa impresión nativa.
             - El área #printArea solo se muestra al imprimir.
             ============================================================ -->

        <div class="report-section no-print">
            <button class="btn-report" type="button" onclick="prepararImpresion()">
                🖨️ GENERAR REPORTE PARA IMPRIMIR
            </button>
        </div>

        <div id="printArea" class="only-print"></div>

        <!-- ============================================================
             BLOQUE: Pie del módulo

             Qué hace:
             - Muestra créditos funcionales del proyecto.
             ============================================================ -->

        <div class="footer no-print">
            Diseño Funcional: <strong>TP</strong> &nbsp;·&nbsp; Desarrollo: chatGPT Plus &nbsp;·&nbsp;
        </div>

    </div>
</div>

<!-- ============================================================
     BLOQUE: Scripts del módulo

     Qué hace:
     - auth.js controla sesión.
     - api.js centraliza llamadas al backend.
     - planning/js/script.js renderiza y gestiona Planning.
     ============================================================ -->

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="planning/js/script.js"></script>
</body>
</html>
